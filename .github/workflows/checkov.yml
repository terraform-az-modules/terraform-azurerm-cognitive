name: Security Scan

on:
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  checkov:
    if: github.actor != 'dependabot[bot]'
    uses: clouddrove/github-shared-workflows/.github/workflows/security-checkov.yml@v2
    with:
      directory: '.'
      continue_on_error: 'true'
      skip_check: 'CKV_TF_1,CKV_AZURE_134,CKV_AZURE_236,CKV2_AZURE_22,CKV_AZURE_112'